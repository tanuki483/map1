<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ﾈｺﾉﾃ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg-primary: #080c14;
      --bg-secondary: #0f1520;
      --bg-tertiary: #161d2e;
      --surface-glass: rgba(15, 21, 32, 0.82);
      --border-primary: rgba(56, 189, 248, 0.15);
      --border-active: rgba(56, 189, 248, 0.45);
      --border-hover: rgba(56, 189, 248, 0.3);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --accent-blue: #38bdf8;
      --accent-cyan: #22d3ee;
      --accent-green: #4ade80;
      --accent-orange: #fb923c;
      --accent-red: #f87171;
      --accent-purple: #c084fc;
      --accent-yellow: #fbbf24;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.6);
      --transition-fast: 0.12s ease;
      --transition-normal: 0.22s ease;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      --font-body: 'Inter', 'Segoe UI', -apple-system, sans-serif;
    }

    /* ── Theme: Warm ── */
    body.theme-warm {
      --bg-primary: #faf7f2;
      --bg-secondary: #f5f0e8;
      --bg-tertiary: #ede6d8;
      --surface-glass: rgba(245, 240, 232, 0.92);
      --border-primary: rgba(180, 140, 80, 0.2);
      --border-active: rgba(180, 140, 80, 0.5);
      --border-hover: rgba(180, 140, 80, 0.35);
      --text-primary: #3d2e1c;
      --text-secondary: #7a6b57;
      --text-muted: #a89880;
      --accent-blue: #b4721a;
      --accent-cyan: #c4872e;
      --accent-green: #2d8a56;
      --accent-orange: #d97706;
      --accent-red: #dc2626;
      --shadow-lg: 0 8px 40px rgba(60, 40, 10, 0.15);
    }

    body.theme-warm::before {
      background: radial-gradient(ellipse 700px 500px at 15% 10%, rgba(180, 140, 80, .06)0%, transparent 70%), radial-gradient(ellipse 500px 400px at 85% 80%, rgba(200, 160, 100, .04)0%, transparent 70%), radial-gradient(ellipse 400px 300px at 60% 30%, rgba(220, 180, 120, .03)0%, transparent 70%)
    }

    body.theme-warm .btn-primary {
      background: linear-gradient(135deg, #b4721a, #c4872e);
      box-shadow: 0 2px 14px rgba(180, 114, 26, .3)
    }

    body.theme-warm .app-header h1 {
      background: linear-gradient(120deg, #b4721a, #c4872e);
      -webkit-background-clip: text;
      background-clip: text
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.5s ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 700px 500px at 15% 10%, rgba(56, 189, 248, .07)0%, transparent 70%), radial-gradient(ellipse 500px 400px at 85% 80%, rgba(34, 211, 238, .05)0%, transparent 70%), radial-gradient(ellipse 400px 300px at 60% 30%, rgba(192, 132, 252, .04)0%, transparent 70%);
      pointer-events: none;
      z-index: 0
    }

    .app-container {
      position: relative;
      z-index: 1;
      max-width: 1440px;
      margin: 0 auto;
      padding: 20px 24px 40px
    }

    /* Header */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 16px 24px;
      background: var(--surface-glass);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-lg);
      box-shadow: 0 0 30px rgba(56, 189, 248, .05)
    }

    .header-title-group {
      display: flex;
      align-items: center;
      gap: 14px
    }

    .header-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, rgba(56, 189, 248, .2), rgba(34, 211, 238, .1));
      border: 1px solid rgba(56, 189, 248, .3);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .header-icon svg {
      width: 22px;
      height: 22px;
    }

    .app-header h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(120deg, var(--accent-blue), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .app-header p {
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 2px
    }

    /* Theme toggle button */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: rgba(56, 189, 248, .08);
      border: 1px solid rgba(56, 189, 248, .2);
      border-radius: 100px;
      font-size: 11px;
      color: var(--accent-blue);
      font-family: var(--font-mono);
      cursor: pointer;
      transition: all var(--transition-normal);
      white-space: nowrap;
      border: none;
      outline: none;
    }

    .theme-toggle:hover {
      background: rgba(56, 189, 248, 0.15);
      border-color: rgba(56, 189, 248, 0.4)
    }

    /* Grid & Cards */
    .controls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 24px
    }

    .control-card {
      background: var(--surface-glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      padding: 24px;
      transition: all var(--transition-normal);
      min-width: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .control-card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 0 20px rgba(56, 189, 248, .06);
      transform: translateY(-2px);
    }

    .card-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      letter-spacing: 1px;
      color: var(--accent-blue);
      margin-bottom: 20px;
      font-weight: 700;
      border-bottom: 1px solid var(--border-primary);
      padding-bottom: 12px;
    }

    .card-icon {
      font-size: 20px;
    }

    /* Links list */
    .link-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-grow: 1;
    }

    .link-list li {
      width: 100%;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      padding: 14px 20px;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-normal);
      font-family: inherit;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
      border: none;
      outline: none;
      text-decoration: none;
      width: 100%;
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid rgba(255, 255, 255, .08)
    }

    .btn-secondary:hover {
      background: rgba(56, 189, 248, .08);
      border-color: rgba(56, 189, 248, .25);
      color: var(--accent-blue);
      transform: translateX(4px);
    }

    .btn-icon {
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0.8;
      font-size: 16px;
    }

    /* Future expansion */
    .future-area {
      margin-top: 40px;
      padding: 40px 20px;
      background: rgba(56, 189, 248, 0.02);
      border: 1px dashed var(--border-active);
      border-radius: var(--radius-lg);
      text-align: center;
      color: var(--text-muted);
      transition: all var(--transition-normal);
    }

    .future-area:hover {
      background: rgba(56, 189, 248, 0.04);
    }

    .future-icon {
      font-size: 32px;
      margin-bottom: 16px;
      opacity: 0.8;
    }

    .future-area h3 {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 600;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      padding: 11px 18px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      z-index: 9999;
      transform: translateY(120px);
      opacity: 0;
      transition: all .28s cubic-bezier(.34, 1.56, .64, 1);
      box-shadow: var(--shadow-lg);
      background: linear-gradient(135deg, #0284c7, #38bdf8);
      color: #fff;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1
    }

    .tool-description {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
      margin-left: 32px;
      line-height: 1.5;
      opacity: 0.8;
    }

    @media(max-width:900px) {
      .controls-grid {
        grid-template-columns: 1fr
      }
    }
  </style>
</head>

<body class="theme-warm">
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-title-group">
        <div class="header-icon">
          <!-- header-icon.svg inline -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="50px" height="50px">
            <path fill="#444b54"
              d="M124.3,102.6L101.9,3.3c-0.3-1.5-1.7-2.5-3.3-2.3c-0.7,0.1-1.3,0.4-1.7,0.9c-0.8,0.8-2.6,2.6-4,4 c-2.9,2.9-6.7,4.8-10.8,5c-4.7,0.3-9.2-1.4-12.5-4.7l-4.3-4.3c-0.5-0.5-1.1-0.8-1.7-0.9c-1.6-0.2-3,0.9-3.3,2.3L38,102.6 c-0.6,2.7-0.8,5.6-0.3,8.2l-2.9,1.3l-3.3-2.7l-15.1-3.5c-3.2-0.7-6.5,0-9.1,2.1c-2.7,2.2-4.2,5.5-4,9c0.3,5.7,5.3,10.1,11.1,10.1 h75.7c0.8,0,1.5-0.2,2.2-0.5l3-1.5l3.4,2h5.8c6,0,11.7-2.4,15.6-6.9C124.1,115.2,125.7,108.8,124.3,102.6z" />
            <path fill="#fff"
              d="M34.1 118.8c.5 1 1.6 1.6 2.7 1.6.5 0 .9-.1 1.4-.3 1.5-.8 2.1-2.6 1.3-4-.9-1.7-1.5-3.5-1.8-5.3l-6.2-1.4C31.7 112.7 32.6 115.8 34.1 118.8zM90 127h8.5c.3-.9.5-1.9.5-3 0-3.9-2.5-7.2-6-8.5L92.9 99c0-1.7-1.4-3-3-3-1.7 0-3 1.4-3-3l.1 18.6c0 .1 0 .2 0 .4 0 1.7 1.3 3 3 3s3 1.3 3 3S91.7 127 90 127zM72 120.4c-1.7 0-3-1.3-3-3L68.9 99c0-1.7 1.3-3 3-3l0 0c1.7 0 3 1.3 3 3l.1 18.4C75 119.1 73.7 120.4 72 120.4L72 120.4zM71 31A3 3 0 1 0 71 37 3 3 0 1 0 71 31zM91 31A3 3 0 1 0 91 37 3 3 0 1 0 91 31z" />
          </svg>
        </div>
        <div>
          <h1>配布・公開用サイト</h1>
          <p>ツールの一覧・サイトマップ</p>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <button class="theme-toggle" id="btn-theme">❄ 寒色/暖色 切替</button>
      </div>
    </header>

    <!-- Sitemap Grid -->
    <div class="controls-grid">

      <!-- 地図 (Map) -->
      <div class="control-card">
        <div class="card-label">
          地図関連ツール
        </div>
        <ul class="link-list">
          <li>
            <!-- 実際のファイルへのリンク -->
            <a href="https://tanuki483.github.io/map1/analyzer.html" class="btn btn-secondary">

            <p class="tool-description">GeoJSONファイルから土地の形状を抽出し、面積計算や形状分析、SVG出力を行うツールです。</p>
          </li>
          <li>
            <a href="https://tanuki483.github.io/map1/coord_adjuster.html" class="btn btn-secondary">
              座標調整ツール
            </a>
            <p class="tool-description">公共座標系や任意座標系のズレを補正し、標準的な座標系への正規化を支援します。</p>
          </li>
        </ul>
      </div>

      <!-- 法律 (Law) -->
      <div class="control-card">
        <div class="card-label">
          法律関連ツール
        </div>
        <ul class="link-list">
          <li>
            <!-- ダミーリンク -->
            <a href="https://example.com/law/inheritance" target="_blank" class="btn btn-secondary">
              未定
            </a>
          </li>
          <li>
            <a href="https://example.com/law/statutory-info" target="_blank" class="btn btn-secondary">
              未定
            </a>
          </li>
          <li>
            <a href="https://example.com/law/real-estate" target="_blank" class="btn btn-secondary">
              未定
            </a>
          </li>
        </ul>
      </div>

      <!-- 家系図 (Family Tree) -->
      <div class="control-card">
        <div class="card-label">
          家系図関係
        </div>
        <ul class="link-list">
          <li>
            <!-- ダミーリンク -->
            <a href="https://example.com/family-tree/creator" target="_blank" class="btn btn-secondary">
              未定
            </a>
          </li>
          <li>
            <a href="https://example.com/family-tree/koseki-reader" target="_blank" class="btn btn-secondary">
              未定
            </a>
          </li>
          <li>
            <a href="https://example.com/family-tree/timeline" target="_blank" class="btn btn-secondary">
              未定
            </a>
          </li>
        </ul>
      </div>

    </div>

    <!-- Future Expansion -->
    <div class="future-area">
      <div class="future-icon"></div>
      <h3>予備領域 (拡張予定スペース)</h3>
      <p>ここに新しいカテゴリを追加する予定です。</p>
    </div>

  </div>

  <div id="toast" class="toast">メッセージが表示されます</div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Theme Toggle Logic
      const themeBtn = document.getElementById('btn-theme');
      themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('theme-warm');
        const isWarm = document.body.classList.contains('theme-warm');
        themeBtn.textContent = isWarm ? '❄ 寒色に切替' : '☀️ 暖色に切替';
        showToast(isWarm ? '暖色テーマを適用しました' : '寒色テーマを適用しました');
      });

      // Toast Logic
      function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
      }
    });
  </script>
</body>

</html>
