<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光学式CSV転送システム</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f0f0f0; }
        .tab { display: none; padding: 20px; }
        .active { display: block; }
        button { padding: 10px 20px; margin: 5px; font-size: 16px; }
        #sender-qr { display: flex; justify-content: center; align-items: center; background: white; padding: 20px; }
        video { max-width: 100%; background: #000; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; font-weight: bold; }
        .progress { height: 20px; background: #4caf50; width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>
    <h1 style="text-align:center; padding:10px; background:#333; color:white;">光学式CSV転送システム (v1.0)</h1>
    
    <div style="text-align:center; margin:10px;">
        <button onclick="switchTab(1)">送信側 (PC)</button>
        <button onclick="switchTab(2)">受信側 (iPhone)</button>
    </div>

    <!-- 送信側 -->
    <div id="tab1" class="tab active">
        <h2>送信側 (PCブラウザ)</h2>
        
        <div>
            <input type="file" id="csvFile" accept=".csv" onchange="handleFileSelect(event)">
        </div>
        
        <div style="margin:15px 0;">
            <label>FPS: <input type="range" id="fps" min="3" max="15" value="8" oninput="updateFps(this.value)"> <span id="fpsValue">8</span></label>
        </div>
        
        <button onclick="startSending()" id="sendBtn" disabled>送信開始</button>
        <button onclick="stopSending()">停止</button>
        
        <div id="senderStatus" class="status">待機中</div>
        <div id="progressContainer" style="background:#ddd; height:20px; margin:10px 0;">
            <div id="progressBar" class="progress"></div>
        </div>
        
        <div id="sender-qr" style="width:100%; max-width:800px; margin:20px auto; border:2px solid #333; display:none;"></div>
        
        <div id="missingList" style="margin-top:20px; display:none;">
            <h3>不足フレーム (受信側から入力)</h3>
            <textarea id="missingInput" rows="5" style="width:100%;"></textarea>
            <button onclick="resendMissing()">指定フレーム再送</button>
        </div>
    </div>

    <!-- 受信側 -->
    <div id="tab2" class="tab">
        <h2>受信側 (iPhone Safari)</h2>
        
        <button onclick="startCamera()">カメラ開始</button>
        <button onclick="stopCamera()">停止</button>
        
        <div style="margin:15px 0;">
            <video id="video" autoplay playsinline style="width:100%; max-height:60vh;"></video>
            <canvas id="canvas" style="display:none;"></canvas>
        </div>
        
        <div id="receiverStatus" class="status">カメラ待機</div>
        <div id="rxProgressContainer" style="background:#ddd; height:20px; margin:10px 0;">
            <div id="rxProgressBar" class="progress"></div>
        </div>
        
        <div id="receivedInfo"></div>
        
        <button onclick="saveCSV()" id="saveBtn" style="display:none;">CSV保存</button>
    </div>

    <script>
        // グローバル変数
        let currentTab = 1;
        let qrCodeInstance = null;
        let frames = [];
        let currentFrameIndex = 0;
        let transferId = 0;
        let fps = 8;
        let intervalId = null;
        let isSending = false;

        // 受信側
        let videoStream = null;
        let receivedFrames = new Map(); // frameNum -> data
        let totalFrames = 0;
        let currentTransferId = null;
        let animationFrameId = null;
        let fileName = "received.csv";

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab${tab}`).classList.add('active');
            currentTab = tab;
        }

        // ------------------- 送信側 -------------------
        async function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            fileName = file.name;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const arrayBuffer = ev.target.result;
                processFile(arrayBuffer);
            };
            reader.readAsArrayBuffer(file);
        }

        async function processFile(arrayBuffer) {
            document.getElementById('senderStatus').textContent = '読み込み中...';
            document.getElementById('sendBtn').disabled = true;
            
            try {
                // gzip圧縮
                const compressed = pako.gzip(new Uint8Array(arrayBuffer));
                console.log(`Original: ${arrayBuffer.byteLength}, Compressed: ${compressed.length}`);
                
                // CRC32計算 (簡易実装)
                const crc32 = calculateCRC32(compressed);
                
                // フレーム分割 (約2500Byte payload)
                const payloadSize = 2450; // 安全マージン
                frames = [];
                
                transferId = Math.floor(Math.random() * 0xFFFFFFFF);
                
                const totalData = compressed.length;
                let offset = 0;
                let frameNum = 0;
                
                while (offset < totalData) {
                    const chunkSize = Math.min(payloadSize, totalData - offset);
                    const payload = compressed.slice(offset, offset + chunkSize);
                    
                    const header = new Uint8Array(1 + 4 + 2 + 2 + 2);
                    header[0] = 1; // Protocol Version
                    new DataView(header.buffer).setUint32(1, transferId, true);
                    new DataView(header.buffer).setUint16(5, Math.ceil(totalData / payloadSize), true); // Total Frames
                    new DataView(header.buffer).setUint16(7, frameNum, true);
                    new DataView(header.buffer).setUint16(9, payload.length, true);
                    
                    const frameData = new Uint8Array(header.length + payload.length + 4);
                    frameData.set(header, 0);
                    frameData.set(payload, header.length);
                    
                    // CRC32 for frame (簡易)
                    const frameCrc = calculateCRC32(frameData.slice(0, header.length + payload.length));
                    new DataView(frameData.buffer).setUint32(header.length + payload.length, frameCrc, true);
                    
                    frames.push(frameData);
                    offset += chunkSize;
                    frameNum++;
                }
                
                document.getElementById('senderStatus').textContent = `準備完了: ${frames.length} フレーム`;
                document.getElementById('sendBtn').disabled = false;
                console.log(`Generated ${frames.length} frames, Transfer ID: ${transferId}`);
            } catch (err) {
                console.error(err);
                alert('ファイル処理エラー');
            }
        }

        function calculateCRC32(data) {
            let crc = 0xFFFFFFFF;
            for (let i = 0; i < data.length; i++) {
                crc ^= data[i];
                for (let j = 0; j < 8; j++) {
                    crc = (crc >>> 1) ^ (0xEDB88320 & -(crc & 1));
                }
            }
            return ~crc >>> 0;
        }

        function startSending() {
            if (frames.length === 0) return;
            if (isSending) return;
            
            isSending = true;
            currentFrameIndex = 0;
            document.getElementById('sender-qr').style.display = 'flex';
            document.getElementById('senderStatus').textContent = '送信中...';
            
            // QR表示エリア
            const qrContainer = document.getElementById('sender-qr');
            qrContainer.innerHTML = '';
            
            const qrDiv = document.createElement('div');
            qrContainer.appendChild(qrDiv);
            
            // 初回QR表示
            showNextFrame(qrDiv);
            
            // インターバル開始
            const intervalMs = Math.floor(1000 / fps);
            intervalId = setInterval(() => {
                if (!isSending) return;
                currentFrameIndex = (currentFrameIndex + 1) % frames.length;
                showNextFrame(qrDiv);
            }, intervalMs);
        }

        function showNextFrame(container) {
            container.innerHTML = '';
            
            const frameData = frames[currentFrameIndex];
            const base64 = btoa(String.fromCharCode.apply(null, frameData));
            
            const qr = new QRCode(container, {
                text: base64,
                width: 600,
                height: 600,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.M
            });
            
            // 進捗更新
            const progress = Math.round((currentFrameIndex / frames.length) * 100);
            document.getElementById('progressBar').style.width = `${progress}%`;
        }

        function stopSending() {
            isSending = false;
            if (intervalId) clearInterval(intervalId);
            document.getElementById('senderStatus').textContent = '送信停止';
        }

        function updateFps(val) {
            fps = parseInt(val);
            document.getElementById('fpsValue').textContent = fps;
        }

        function resendMissing() {
            const input = document.getElementById('missingInput').value.trim();
            if (!input) return;
            
            const missing = input.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
            if (missing.length === 0) return;
            
            // 簡易: 再送モードとして表示
            alert(`フレーム ${missing.join(', ')} を再送します (実装中)`);
            // 実際はmissingフレームのみ順次表示するロジックを追加
        }

        // ------------------- 受信側 -------------------
        async function startCamera() {
            try {
                const video = document.getElementById('video');
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = videoStream;
                
                document.getElementById('receiverStatus').textContent = '受信中...';
                startScanning();
            } catch (err) {
                console.error(err);
                alert('カメラ起動失敗: ' + err.message);
            }
        }

        function stopCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
            }
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            document.getElementById('receiverStatus').textContent = '停止';
        }

        function startScanning() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            function scan() {
                if (!video.videoWidth) {
                    animationFrameId = requestAnimationFrame(scan);
                    return;
                }
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                
                if (code) {
                    handleQRCode(code.data);
                }
                
                animationFrameId = requestAnimationFrame(scan);
            }
            
            scan();
        }

        function handleQRCode(base64Data) {
            try {
                // base64 → Uint8Array
                const binary = atob(base64Data);
                const frameData = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    frameData[i] = binary.charCodeAt(i);
                }
                
                // ヘッダ解析
                const dv = new DataView(frameData.buffer);
                const version = frameData[0];
                const tid = dv.getUint32(1, true);
                const total = dv.getUint16(5, true);
                const frameNum = dv.getUint16(7, true);
                const payloadLen = dv.getUint16(9, true);
                
                if (version !== 1) return;
                
                // CRCチェック (簡易)
                const crcReceived = dv.getUint32(11 + payloadLen, true);
                const computed = calculateCRC32(frameData.slice(0, 11 + payloadLen));
                if (crcReceived !== computed) {
                    console.warn('CRC mismatch');
                    return;
                }
                
                // Transfer IDチェック
                if (currentTransferId === null) {
                    currentTransferId = tid;
                    totalFrames = total;
                    receivedFrames.clear();
                } else if (currentTransferId !== tid) {
                    return; // 別転送
                }
                
                // 保存
                if (!receivedFrames.has(frameNum)) {
                    const payload = frameData.slice(11, 11 + payloadLen);
                    receivedFrames.set(frameNum, payload);
                    
                    updateReceiverProgress();
                }
                
                // 完了チェック
                if (receivedFrames.size === totalFrames) {
                    completeTransfer();
                }
            } catch (e) {
                console.error(e);
            }
        }

        function updateReceiverProgress() {
            const percent = Math.round((receivedFrames.size / totalFrames) * 100);
            document.getElementById('rxProgressBar').style.width = `${percent}%`;
            document.getElementById('receivedInfo').innerHTML = `
                受信: ${receivedFrames.size} / ${totalFrames} フレーム (${percent}%)<br>
                Transfer ID: ${currentTransferId}
            `;
        }

        async function completeTransfer() {
            stopCamera();
            document.getElementById('receiverStatus').textContent = 'CRC確認中...';
            
            // 全ペイロード結合
            let fullCompressed = new Uint8Array(0);
            for (let i = 0; i < totalFrames; i++) {
                if (!receivedFrames.has(i)) {
                    alert('フレーム欠損');
                    return;
                }
                const chunk = receivedFrames.get(i);
                const temp = new Uint8Array(fullCompressed.length + chunk.length);
                temp.set(fullCompressed);
                temp.set(chunk, fullCompressed.length);
                fullCompressed = temp;
            }
            
            // 解凍
            try {
                const decompressed = pako.ungzip(fullCompressed);
                const blob = new Blob([decompressed], { type: 'text/csv' });
                
                // ダウンロードリンク
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName || 'received.csv';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                document.getElementById('receiverStatus').textContent = '保存完了!';
                document.getElementById('saveBtn').style.display = 'inline-block';
            } catch (e) {
                alert('解凍エラー');
            }
        }

        function saveCSV() {
            // ダウンロードはcompleteTransferで実施済み
        }

        // 初期化
        window.onload = () => {
            console.log('光学式CSV転送システム 起動');
            // テスト用ダミーファイル
        };
    </script>
</body>
</html>
